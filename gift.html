<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>West Union AAA | Gift Membership</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="gift__page">

  <div class="gift__container">

    <p class="gift__tag">
      WEST UNION AAA
    </p>

    <h1 class="gift__title">
      Gift a Membership
    </h1>

    <p class="gift__para">
      Give someone peace of mind on the road with reliable roadside assistance.
    </p>

    <div class="offer__box">

      <p>
        Perfect for:
      </p>

      <div class="offer__highlight">
        Family, Friends, Students, Drivers
      </div>

    </div>

    <form class="gift__form">

      <div class="form__group">
        <label>Your Name</label>
        <input type="text" required>
      </div>

      <div class="form__group">
        <label>Your Email</label>
        <input type="email" required>
      </div>

      <div class="form__group">
        <label>Recipient Name</label>
        <input type="text" required>
      </div>

      <div class="form__group">
        <label>Recipient Email</label>
        <input type="email" required>
      </div>

      <div class="form__group">
        <label>Gift Message</label>
        <input type="text"
               placeholder="Enjoy your roadside protection!">
      </div>

      <button class="gift__btn" type="submit"  target="_blank">
        Send Gift Membership
      </button>

    </form>

    <div class="gift__links">

      <a href="index.html">
        ← Back to Home
      </a>

    </div>

  </div>

</body>

</html>
