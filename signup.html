<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>West Union AAA | Sign Up</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>

  
</head>

<body class="signup__page">

  <div class="signup__container">

    <p class="signup__tag">
      WEST UNION AAA
    </p>

    <h1 class="signup__title">
      Claim Your Launch Offer
    </h1>

    <p class="signup__para">
      Join today and get reliable roadside assistance whenever you need it.
    </p>

    <div class="offer__box">

      <p>
        First 499 members get their first year for only
      </p>

      <div class="offer__highlight">
        $49.99
      </div>

    </div>

    <form class="signup__form">

      <div class="form__group">
        <label for="first__name">First Name</label>
        <input type="text" id="first__name" required>
      </div>

      <div class="form__group">
        <label for="last__name">Last Name</label>
        <input type="text" id="last__name" required>
      </div>

      <div class="form__group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form__group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form__group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>

      <button class="signup__btn" type="submit">
        Create Membership
      </button>

    </form>

    <div class="signup__links">

      <a href="login.html">
        Already have an account? Log in
      </a>

      <a href="gift.html">
        Want to gift a membership?
      </a>

    </div>

  </div>

</body>

</html>
